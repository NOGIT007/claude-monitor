name: Version Bump & Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from PR labels
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"

          # Update package.json
          jq --arg v "$NEW" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update changelog
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          export DATE=$(date +%Y-%m-%d)

          # Extract Summary section from PR body if present
          export SUMMARY=$(echo "$PR_BODY" | sed -n '/^## Summary/,/^##/p' | grep '^\s*-' | head -10)
          if [ -z "$SUMMARY" ]; then
            export SUMMARY="- ${PR_TITLE}"
          fi

          # Build new changelog entry using python to avoid sed escaping issues
          python3 << 'PYEOF'
          import sys, os
          version = os.environ["NEW_VERSION"]
          date = os.environ.get("DATE", "")
          summary = os.environ.get("SUMMARY", "")
          pr_num = os.environ["PR_NUMBER"]
          pr_url = os.environ["PR_URL"]

          entry = f"\n## [{version}] - {date}\n\n### Changed\n{summary}\n\n_PR [#{pr_num}]({pr_url})_\n"

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          content = content.replace("# Changelog\n", "# Changelog\n" + entry, 1)

          with open("CHANGELOG.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
          OLD_VERSION: ${{ steps.version.outputs.old }}
          REPO: ${{ github.repository }}
        run: |
          # Extract summary from PR body
          SUMMARY=$(echo "$PR_BODY" | sed -n '/^## Summary/,/^##/p' | grep '^\s*-' | head -10)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="- ${PR_TITLE}"
          fi

          NOTES="## What's Changed

          ${SUMMARY}

          **PR:** [#${PR_NUMBER}](${PR_URL})

          **Full Changelog:** https://github.com/${REPO}/compare/v${OLD_VERSION}...v${NEW_VERSION}"

          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes "$NOTES"
