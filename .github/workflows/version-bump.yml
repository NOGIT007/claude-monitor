name: Version Bump & Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from PR labels
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"

          # Update package.json
          jq --arg v "$NEW" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update changelog
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.new }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BODY=$(echo '${{ github.event.pull_request.body }}' | head -20)

          # Extract Summary section from PR body if present
          SUMMARY=$(echo "$PR_BODY" | sed -n '/^## Summary/,/^##/p' | grep '^\s*-' | head -10)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="- ${PR_TITLE}"
          fi

          # Build new entry
          ENTRY="## [${VERSION}] - ${DATE}\n\n### Changed\n${SUMMARY}\n\n_PR [#${PR_NUMBER}](${PR_URL})_\n"

          # Insert after the header line
          sed -i "/^# Changelog/a\\
          \\
          ${ENTRY}" CHANGELOG.md

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          # Extract summary from PR body
          PR_BODY=$(cat <<'PREOF'
          ${{ github.event.pull_request.body }}
          PREOF
          )
          SUMMARY=$(echo "$PR_BODY" | sed -n '/^## Summary/,/^##/p' | grep '^\s*-' | head -10)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="- ${PR_TITLE}"
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$(cat <<EOF
          ## What's Changed

          ${SUMMARY}

          **PR:** [#${PR_NUMBER}](${PR_URL})

          **Full Changelog:** https://github.com/${{ github.repository }}/compare/v${{ steps.version.outputs.old }}...v${VERSION}
          EOF
          )"
