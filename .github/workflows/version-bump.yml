name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          # Extract summary from PR body
          SUMMARY=$(echo "$PR_BODY" | sed -n '/^## Summary/,/^##/p' | grep '^\s*-' | head -10)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="- ${PR_TITLE}"
          fi

          # Find previous tag for changelog link
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi

          NOTES="## What's Changed"
          NOTES="${NOTES}
          ${SUMMARY}

          **PR:** [#${PR_NUMBER}](${PR_URL})

          **Full Changelog:** https://github.com/${REPO}/compare/${PREV_TAG}...v${VERSION}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${NOTES}"

      - name: Skip (tag exists)
        if: steps.version.outputs.exists == 'true'
        run: echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release."
